<div style="background-color:#F5F0EB; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding:16px 8px; box-sizing:border-box;">
  <div style="max-width:600px; margin:0 auto; background:#FFFFFF; border-radius:16px; padding:24px 16px; box-sizing:border-box;">

    <!-- HEADER / INTRO -->
    <div style="margin-bottom:32px;">
      <h1 style="font-family: Georgia, serif; font-size:26px; font-weight:400; color:#1F2937; margin:0 0 16px 0;">Recap & Priorities</h1>
      <p style="font-size:15px; color:#4B5563; margin:0; line-height:1.6;">
        {{INTRO_TEXT}}
      </p>
    </div>

    <!-- ACTION REQUIRED -->
    <div style="margin-bottom:32px;">
      <p style="font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#9CA3AF; margin:0 0 16px 0; border-bottom:1px solid #E5E7EB; padding-bottom:8px;">ACTION REQUIRED</p>

      {{ACTION_ITEMS}}
      <!-- Item template:
      <div style="margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid #F3F4F6;">
        <table width="100%" border="0" cellpadding="0" cellspacing="0" style="margin-bottom:8px;">
          <tr>
            <td align="left" valign="top" style="padding-right: 16px;">
              <p style="font-size:16px; font-weight:600; color:#1F2937; margin:0; line-height:1.4;">{{TITLE}}</p>
            </td>
            <td align="right" valign="top" width="1" style="white-space:nowrap;">
              <span style="background-color:{{PILL_BG}}; color:{{PILL_COLOR}}; padding:4px 10px; border-radius:12px; font-size:12px; font-weight:600; display:inline-block;">{{PILL_TEXT}}</span>
            </td>
          </tr>
        </table>
        <p style="font-size:15px; color:#6B7280; margin:0; line-height:1.5;">{{DESCRIPTION}}</p>
      </div>
      -->
    </div>

    <!-- FYI / COMPLETED -->
    <div style="margin-bottom:32px;">
      <p style="font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#9CA3AF; margin:0 0 16px 0; border-bottom:1px solid #E5E7EB; padding-bottom:8px;">FYI</p>

      {{FYI_ITEMS}}
    </div>

    <!-- TRACKING / ONGOING -->
    <div style="margin-bottom:40px;">
      <p style="font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#9CA3AF; margin:0 0 16px 0; border-bottom:1px solid #E5E7EB; padding-bottom:8px;">TRACKING</p>

      {{TRACKING_ITEMS}}
    </div>

    <!-- SCHEDULE -->
    <div style="margin-bottom:24px;">
      <h2 style="font-family: Georgia, serif; font-size:22px; font-weight:400; color:#1F2937; margin:0 0 24px 0;">Tomorrow's Schedule</h2>
      
      {{SCHEDULE_ITEMS}}
      <!-- Item template:
      <div style="border-left:3px solid #8B5CF6; padding-left:16px; margin-bottom:24px;">
        <p style="font-size:16px; font-weight:600; color:#1F2937; margin:0 0 4px 0;">{{TITLE}}</p>
        <p style="font-size:13px; color:#9CA3AF; margin:0 0 12px 0;">{{TIME_AND_ATTENDEES}}</p>
        <ul style="margin:0; padding-left:20px; color:#4B5563; font-size:14px; line-height:1.6;">
          <li style="margin-bottom:6px;">{{BULLET_1}}</li>
        </ul>
      </div>
      -->
    </div>
    
    <div style="margin-top:40px; text-align:center;">
        <p style="font-size:12px; color:#9CA3AF; margin:0;">Daily Briefing · hello@genee.coach · {{DATE_STRING}}</p>
    </div>

  </div>
</div>
